<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi vidrio empañado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="panelControles" class="panel-controles">
        
        <span id="btnMinimizar" class="btn-minimizar">➖</span>
        
        <div class="contenido-panel">
            <h2>Vidrio empañado</h2>
            <p style="margin-bottom: 5px;">Pasa el mouse o el dedo para limpiarlo</p>
            
            <button id="btnCaptura" class="btn-captura">📸 Guardar Foto</button>
            <button id="btnReset" class="btn-interactivo">🔄 Volver a Empañar</button>
            
            <div class="control-grosor">
                <label for="grosor">Grosor del dedo:</label>
                <input type="range" id="grosor" min="10" max="100" value="40">
            </div>
        </div>
    </div>

    <div class="fondo"></div>
    
    <div class="contenedor">
        <canvas id="vidrio"></canvas>
        </div>
    
    <script src="script.js"></script>
</body>
</html>
